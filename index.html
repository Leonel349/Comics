<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Manga Archive</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <link rel="stylesheet" href="style.css?v=9">
</head>
<body>

    <h1>📚 My Full ComicK Database</h1>
    <div class="subtitle">Complete local file dataset parser supporting dynamic CSV/XML compilation pipelines with live log tracking</div>
    
    <input type="text" id="search" placeholder="🔍 Search across all fields and metadata columns instantly...">

    <!-- Central Control Panel Configuration -->
    <div class="panel-grid">
        <div class="controls-row">
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <label for="csvFileInput" class="btn btn-secondary">📁 Load Local CSV / XML</label>
                <input type="file" id="csvFileInput" accept=".csv, .xml" style="display: none;">
                <span id="fileNameDisplay" style="color: #7f8c8d; font-size: 12px;">(Select a file to begin)</span>
            </div>
            
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button id="themeToggle" class="btn btn-secondary">🌓 Toggle Theme</button>
                <button id="exportCsvButton" class="btn btn-primary" style="display: none;">💾 Export CSV</button>
                <button id="exportXmlButton" class="btn btn-primary" style="display: none; background-color: #9b59b6;">📦 Export XML</button>
            </div>
        </div>
        
        <div id="columnToggleWrapper" style="display: none;">
            <div style="font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; color: #7f8c8d;">⚙️ Toggle Column Visibility:</div>
            <div id="checkboxContainer" class="checkbox-group"></div>
        </div>
    </div>

    <!-- Live Execution Tracking Log Console Component -->
    <div class="log-container">
        <div class="log-header">
            <span>🖥️ System Process Terminal Logs:</span>
            <button id="clearLogBtn" style="background: transparent; border: none; color: #7f8c8d; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold;">Clear Logs</button>
        </div>
        <div id="logConsoleOutput" class="log-body">
            <div class="log-row info">System initialized. Waiting for raw dataset loading file triggers...</div>
        </div>
    </div>

    <div class="table-container">
        <table id="mangaTable">
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Data pipeline modules registration -->
    <script src="csvParser.js?v=9"></script>
    <script src="api.js?v=9"></script>
    <script src="ui.js?v=9"></script>
    <script src="exporter.js?v=9"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
