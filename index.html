<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Manga Archive</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>

    <h1>📚 My Full ComicK Database</h1>
    <div class="subtitle">Complete dataset with structural columns sorting, translation fallbacks and saved preferences</div>
    
    <input type="text" id="search" placeholder="🔍 Search across all fields and metadata columns instantly...">

    <!-- Central Control Panel Configuration -->
    <div class="panel-grid">
        <div class="controls-row">
            <div>
                <label for="csvFileInput" class="btn btn-secondary">📁 Load Local CSV</label>
                <input type="file" id="csvFileInput" accept=".csv" style="display: none;">
                <span id="fileNameDisplay" style="margin-left: 5px; color: #7f8c8d; font-size: 12px;">(Auto-loading)</span>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="themeToggle" class="btn btn-secondary">🌓 Toggle Theme</button>
                <button id="exportCsvButton" class="btn btn-primary" style="display: none;">💾 Download Updated CSV</button>
            </div>
        </div>
        
        <!-- Interactive Visibility Toggle Group Wrapper -->
        <div id="columnToggleWrapper" style="display: none;">
            <div style="font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; color: #7f8c8d;">⚙️ Toggle Column Visibility:</div>
            <div id="checkboxContainer" class="checkbox-group"></div>
        </div>
    </div>

    <div class="table-container">
        <table id="mangaTable">
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="csvParser.js?v=7"></script>
    <script src="api.js?v=7"></script>
    <script src="ui.js?v=7"></script>
    <script src="exporter.js?v=7"></script>
    <script src="app.js?v=7"></script>
</body>
</html>
