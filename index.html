<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Manga Archive</title>
    
    <!-- FIX: This inline data string tells the browser not to look for an external favicon.ico file, instantly solving the 404 error -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    
    <!-- Incrementing version numbers forces the browser to drop cached file data -->
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <h1>📚 My Full ComicK Database</h1>
    <div class="subtitle">Complete dataset with dynamic MyAnimeList cover artwork streaming</div>
    
    <input type="text" id="search" placeholder="🔍 Search across all fields and metadata columns instantly...">

    <div class="table-container">
        <table id="mangaTable">
            <thead>
                <tr id="tableHeaders">
                    <!-- CSV Headers are automatically built here -->
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected automatically -->
            </tbody>
        </table>
    </div>

    <!-- UPDATE TO VERSION 3: This guarantees your browser uses the cleaned string numbers for images -->
    <script src="csvParser.js"></script>
    <script src="app.js"></script>
</body>
</html>
